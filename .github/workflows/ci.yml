name: Shield CLI — CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" --no-cache-dir

      - name: Run tests
        env:
          PYTHONUTF8: "1"
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Check imports
        env:
          PYTHONUTF8: "1"
        run: |
          python -c "from utils.input_validator import validate_target; print('Validator OK')"
          python -c "from core.memory import PentestMemory; print('Memory OK')"
          python -c "from utils.scope_validator import ScopeValidator; print('Scope OK')"
